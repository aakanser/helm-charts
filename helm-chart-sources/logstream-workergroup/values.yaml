# Default values for logstream-workergroup.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

rbac:
  create: true
  # name:
  apiGroups: 
  - core
  resources:
  - pods
  verbs:
  - get
  - list
  annotations: {}

serviceAccount:
  create: true
  # name:

criblImage:
  repository: public.ecr.aws/t3p9i4u9/cribl
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 4.18.0-TC404404
  wolfiImage: false

imagePullSecrets: []
nameOverride: ""

config: 
  host: logstream-leader-internal
  port: 4200
  group: kubernetes
  token: criblleader
  useExistingSecret: false
  rejectSelfSignedCerts: 0
  probes: true
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 9000
      scheme: HTTP
    initialDelaySeconds: 20
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 9000
      scheme: HTTP
    initialDelaySeconds: 20
    failureThreshold: 3
  tlsLeader:
    enable: false
  tags: []

deployment: deployment

statefulset:
  persistentVolumeClaimRetentionPolicy: {}
    # whenDeleted: Delete 
    # whenScaled: Delete

podAnnotations: {}

# Add an annotation to the deployment pods that will automatically restart the
# pods anytime there is a change to the secret for the logstream configuration.
includeSecretConfigAnnotation: false

nodeSelector: {}
# tolerations: []

affinity: {}

#extraPodConfigs:
#  topologySpreadConstraints: []

service:
  enable: true
  type: LoadBalancer
  annotations: {}
  # externalTrafficPolicy: Local
  # loadBalancerSourceRanges:
  #  - "0.0.0.0/0"

  ports:
  - name: tcpjson
    port: 10001
    protocol: TCP
    #nodePort:
  - name: s2s
    port: 9997
    protocol: TCP
    #nodePort:
  - name: http
    port: 10080
    protocol: TCP
    #nodePort:
  - name: https
    port: 10081
    protocol: TCP
    #nodePort:
  - name: syslog
    port: 5140
    protocol: TCP
    #nodePort:
  - name: metrics
    port: 8125
    protocol: TCP
    #nodePort:
  - name: elastic
    port: 9200
    protocol: TCP
    #nodePort:
  - name: hec
    port: 8088
    protocol: TCP
    #nodePort:
  - name: criblhttp
    port: 10200
    protocol: TCP
    #nodePort:
  - name: cribltcp
    port: 10300
    protocol: TCP
    #nodePort:

resources: 
  limits:
    # The stock limits below result in Stream running 4 worker processes in the
    # pod with 2 additional cores available for the server process and for threads
    # handling I/O, compression, etc. Prior to the 4.11.0 release, these limits
    # were 2000m and 4192Mi which was likely to cause degraded throughput at
    # realistic loads.
    cpu: 6000m
    memory: 8192Mi
  requests:
    # Note that these request levels are extremely low for a production
    # deployment but changing the stock settings could break existing users
    # so we've not adjusted them. Setting them closer to the limits above is
    # recommended to avoid starving the pods on oversubscribed cluster nodes.
    cpu: 1250m
    memory: 256Mi

# Replacement Strategy
#strategy:
#  type: RollingUpdate
#  rollingUpdate:
#    maxSurge: 25%
#    maxUnavailable: 25%

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  behavior: {}
#    scaleUp:
#     stabilizationWindowSeconds: 300
