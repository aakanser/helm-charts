---
# Default values for logstream-leader.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

criblImage:
  repository: public.ecr.aws/t3p9i4u9/cribl
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 4.18.0-TC404404
  wolfiImage: false

imagePullSecrets: []
nameOverride: "leader"
fullnameOverride: ""
iter: 1

autoscaling:
  enabled: false

config:
  scName:
  license:
  token:
  leaderUrl:
  adminPassword:
  criblHome: /opt/cribl
  bindHost: 0.0.0.0
  rejectSelfSignedCerts: 0
  # -- Perform health checks on the Leader pod.
  # Recommended that this be enabled to automatically restart the Leader if the Pod is unhealthy
  probes: true
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 9000
      scheme: HTTP
    initialDelaySeconds: 60
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 9000
      scheme: HTTP
    initialDelaySeconds: 60
    failureThreshold: 3
  groups: []

env: {}

# Downward API values
envValueFrom:
  - name: CRIBL_K8S_POD
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: CRIBL_K8S_CPU_LIMIT
    valueFrom:
      resourceFieldRef:
        resource: limits.cpu
        divisor: 1m

# PQ Shared Storage
#
# When enabled, the chart mounts a single shared (ReadWriteMany) volume into
# the leader pod at `mountPath` and exports `CRIBL_WORKER_VOLUME` so Cribl
# Stream's PQ shared-storage feature can find it. Mount the SAME backend at
# the SAME `mountPath` on every `logstream-workergroup` release that
# participates: each worker writes only to its own subtree (keyed by the
# worker node GUID), while the leader scans/cleans/revives every worker's
# subtree.
#
# The Cribl Stream side of the configuration (selecting NFS storage and the
# `mountPoint`) lives in `local/cribl/pqstorage.yml` and is managed via the
# Cribl Stream UI/API, not the chart. The default `pqstorage.yml` is:
#
#   type: nfs
#   mountPoint: $CRIBL_WORKER_VOLUME/worker
#
# so the chart's `mountPath` must point at the directory whose `worker/`
# subdirectory will hold the `<nodeGuid>/state/queues/...` tree.
#
# The volume must be `ReadWriteMany`-capable (e.g. NFS, EFS, Azure Files,
# Filestore, NFS-CSI). Set exactly one of `existingClaim`, `claim`, or
# `volume` when `enabled` is true.
sharedStorage:
  enabled: true
  # Path inside the container where the shared volume is mounted. This value
  # is also exported as the `CRIBL_WORKER_VOLUME` env var.
  mountPath: /var/cribl-shared-pq
  # Optional subPath into the volume for the mount.
  subPath: ""
  # Reference a pre-existing ReadWriteMany PVC.
  existingClaim: "cribl-shared-pq"
  # Render a PVC alongside this chart. Requires a ReadWriteMany-capable
  # StorageClass. The rendered PVC's name (`<release>-shared-pq`) is also a
  # convenient value to pass to each worker-group release as
  # `sharedStorage.existingClaim`.
  claim: {}
  #   storageClassName: efs-sc
  #   accessModes: ["ReadWriteMany"]
  #   size: 20Gi
  #   annotations: {}
  # Raw volume spec; merged into the pod `volumes` entry as-is.
  volume: {}
  #   nfs:
  #     server: nfs.example.com
  #     path: /exports/cribl-pq
  # Secondary "legacy" volume used to drain queues from a previous shared
  # storage backend during a migration. When enabled, the chart additionally
  # mounts this volume and exports `CRIBL_LEGACY_WORKER_VOLUME`.
  legacy:
    enabled: false
    mountPath: /var/cribl-shared-pq-legacy
    subPath: ""
    existingClaim: ""
    claim: {}
    volume: {}

persistence:
  # -- Disable this to use an emptyDir for CRIBL_VOLUME_DIR config storage
  enabled: true
  # -- Unset claimName to use the Helm Release name as the PVC name
  # This is set for backwards compatibility purposes
  claimName: leader-config-claim
  # -- Set storageClassName to use a class other than the default
  # Will prioritize this value above the value defined in config.scName
  storageClassName:
  # -- Access Modes for the Cribl Leader configs
  accessModes:
    - ReadWriteOnce
  # -- The size of the requested persistent volume claim
  size: 20Gi
  # -- Define any annotation KVs to be set on the PVC
  annotations: {}
  # -- extraSpec permits any custom spec values to be added to the PVC config
  extraSpec: {}

service:
  internalType: ClusterIP
  externalType: LoadBalancer
  # annotations are shared between both the internal and external Service
  annotations: {}
  # internalAnnotations are only applied to the internal Service
  internalAnnotations: {}
  # externalAnnotations are only applied to the external Service
  externalAnnotations: {}
  ports:
    - name: api
      port: 9000
      protocol: TCP
      external: true
    - name: leadercomm
      port: 4200
      protocol: TCP
      external: false

serviceAccount:
  # By default the service account is not created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If name is not set and create is true, a default name is generated using the fullname template
  # If create is false, and name is set, the service account must already exist
  # name:

strategy:
  type: Recreate
  rollingUpdate:
    maxSurge:
    maxUnavailable:

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

ingress:
  enable: false
  annotations: {}
  labels: {}
  tls: []
#    - hosts:
#        - cribl.example.com
#      secretName: cribl-example-com-tls
  prefix: /*
  pathType: Prefix
  ingressClassName:
  host:

resources:
  limits:
    cpu: 2000m
    memory: 4096Mi
  requests:
    cpu: 500m
    memory: 1024Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Extra manifests to be deployed
extraObjects: {}

# Applies extra labels to all resources deployed with this chart
extraLabels: {}
# key: value
# key2: value2

# Pods get 30s by default for orderly shutdown before they're killed but may
# need a little more time in various scenarios. Set this to allow more time.
# terminationGracePeriodSeconds: 60s
